<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sistema Solare - Three.js</title>
  <meta name="description"
    content="Sistema solare 3D interattivo con effetti visivi davvero spaziali! Realizzato con Three.js">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Loader: barra di progresso minimale -->
  <div id="loader">
    <div class="loader-track">
      <div class="loader-bar" id="loaderBar"></div>
    </div>
    <p class="loader-pct" id="loaderPct">0 %</p>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
      "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
    }
  }
  </script>
  <script type="module" src="main.js"></script>
</body>

</html>
